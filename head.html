<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>조장 관리 페이지</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#e3f2fd",
            "background-light": "#f6f7f8",
            "background-dark": "#101a22",
          },
          fontFamily: {
            display: ["Inter", "Noto Sans KR", "sans-serif"],
          },
          borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
        },
      },
    };
  </script>
  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      min-height: max(884px, 100dvh);
    }

    .modal-overlay {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
    }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
  <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
    <!-- Header -->
    <header
      class="sticky top-0 z-10 flex items-center bg-white dark:bg-slate-900 border-b border-primary/30 p-4 justify-between shadow-sm">
      <div
        class="text-blue-600 dark:text-blue-400 flex size-10 shrink-0 items-center justify-center bg-primary/40 rounded-full">
        <span class="material-symbols-outlined">crown</span>
      </div>
      <h1 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">조장 관리
        페이지</h1>
      <button onclick="signOut()" class="text-slate-400 hover:text-slate-600 flex size-10 items-center justify-center"
        title="로그아웃">
        <span class="material-symbols-outlined">logout</span>
      </button>
    </header>

    <main class="flex-1 pb-24">
      <!-- Banner -->
      <div class="px-4 pt-6 pb-2">
        <div class="w-full h-32 rounded-xl overflow-hidden relative bg-gradient-to-r from-blue-600 to-blue-400">
          <div class="absolute inset-0 flex items-end p-4">
            <div class="flex flex-col">
              <span id="banner-week" class="text-white font-semibold text-sm">로딩 중...</span>
              <span id="banner-dept" class="text-blue-100 text-xs mt-0.5"></span>
            </div>
          </div>
          <div class="absolute top-4 right-4">
            <span id="banner-group"
              class="bg-white/20 text-white px-3 py-1 rounded-full text-xs font-bold backdrop-blur-sm"></span>
          </div>
        </div>
      </div>

      <!-- Section: Task Management -->
      <section class="px-4 pt-6">
        <div class="flex items-center gap-2 mb-4">
          <span class="material-symbols-outlined text-blue-500 text-xl">assignment</span>
          <h2 class="text-slate-900 dark:text-white text-[20px] font-bold leading-tight">이번 주 과제 및 가이드 관리</h2>
        </div>
        <div class="flex flex-col gap-3">
          <button onclick="openCreateModal()"
            class="flex min-w-[84px] cursor-pointer items-center justify-center gap-2 rounded-xl h-14 px-5 bg-blue-600 text-white text-base font-bold transition-all active:scale-95 shadow-md shadow-blue-200 dark:shadow-none">
            <span class="material-symbols-outlined">add_circle</span>
            <span class="truncate">새 과제 / 가이드 직접 등록하기</span>
          </button>
          <div class="flex gap-2">
            <button id="import-task-btn" onclick="handleImportTasks()"
              class="flex-1 flex min-w-[84px] cursor-pointer items-center justify-center gap-1.5 rounded-xl h-14 px-2 bg-white dark:bg-slate-800 border-2 border-primary text-slate-700 dark:text-slate-200 text-[13px] font-bold transition-all active:scale-95">
              <span class="material-symbols-outlined text-base">history</span>
              <span id="import-task-btn-text" class="truncate">과제 불러오기</span>
            </button>
            <button id="import-guide-btn" onclick="handleImportGuides()"
              class="flex-1 flex min-w-[84px] cursor-pointer items-center justify-center gap-1.5 rounded-xl h-14 px-2 bg-white dark:bg-slate-800 border-2 border-primary text-slate-700 dark:text-slate-200 text-[13px] font-bold transition-all active:scale-95">
              <span class="material-symbols-outlined text-base">event_repeat</span>
              <span id="import-guide-btn-text" class="truncate">가이드 불러오기</span>
            </button>
          </div>
        </div>
      </section>

      <!-- Section: Current Tasks List -->
      <section class="px-4 pt-6">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-blue-500 text-xl">checklist</span>
            <h2 class="text-slate-900 dark:text-white text-base font-bold">등록된 과제</h2>
          </div>
          <span id="current-task-count" class="text-xs text-slate-500 font-medium"></span>
        </div>
        <div id="current-task-list" class="flex flex-col gap-2">
          <div class="text-center py-4 text-slate-400 text-sm">로딩 중...</div>
        </div>
      </section>

      <!-- Section: Daily Guides List -->
      <section class="px-4 pt-6">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-blue-500 text-xl">lightbulb</span>
            <h2 class="text-slate-900 dark:text-white text-base font-bold">등록된 가이드</h2>
          </div>
        </div>
        <div id="current-guide-list" class="flex flex-col gap-2">
          <div class="text-center py-4 text-slate-400 text-sm">로딩 중...</div>
        </div>
      </section>

      <!-- Section: Group Members List -->
      <section class="px-4 pt-6 pb-6">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-blue-500 text-xl">group</span>
            <h2 class="text-slate-900 dark:text-white text-base font-bold">우리 조원 명단</h2>
          </div>
          <span id="group-member-count" class="text-xs text-slate-500 font-medium"></span>
        </div>
        <button onclick="openSendMessageModal()"
          class="w-full flex items-center justify-center gap-2 rounded-xl h-12 mb-3 bg-gradient-to-r from-violet-600 to-blue-600 text-white text-sm font-bold transition-all active:scale-95 shadow-md shadow-violet-200 dark:shadow-none">
          <span class="material-symbols-outlined text-lg">send</span>
          <span>메시지 보내기</span>
        </button>
        <div id="group-member-list" class="flex flex-col gap-2">
          <div class="text-center py-4 text-slate-400 text-sm">로딩 중...</div>
        </div>
      </section>

      <!-- Bottom Nav -->
      <nav
        class="fixed bottom-0 left-0 right-0 flex justify-around items-center border-t border-slate-100 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md px-4 pb-6 pt-2 z-20">
        <a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
          href="member.html">
          <span class="material-symbols-outlined">home</span>
          <p class="text-[10px] font-bold">홈</p>
        </a>
        <button onclick="openMessageListModal()"
          class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 transition-colors relative"
          id="msg-nav-btn">
          <span class="relative">
            <span class="material-symbols-outlined">mail</span>
            <span id="msg-badge"
              class="absolute -top-1.5 -right-2.5 hidden min-w-[18px] h-[18px] bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center px-1 shadow-sm">0</span>
          </span>
          <p class="text-[10px] font-bold">메시지</p>
        </button>
        <a class="flex flex-col items-center gap-1 text-blue-600 dark:text-blue-400" href="head.html">
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">crown</span>
          <p class="text-[10px] font-bold">조장</p>
        </a>
      </nav>
  </div>

  <!-- Message List Modal (from member.html) -->
  <div id="msg-list-modal" class="fixed inset-0 z-[70] hidden items-center justify-center modal-overlay">
    <div
      class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-sm mx-4 shadow-2xl overflow-hidden max-h-[85vh] flex flex-col">
      <div class="flex items-center justify-between p-5 border-b border-slate-100 dark:border-slate-700 shrink-0">
        <h3 id="msg-modal-title" class="text-lg font-bold flex items-center gap-2">
          <span class="material-symbols-outlined text-blue-600">mail</span> 받은 메시지
        </h3>
        <button onclick="closeMessageListModal()" class="text-slate-400 hover:text-slate-600">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <!-- Tab Selector (Hidden by default, shown if leader) -->
      <div id="msg-tab-container" class="hidden border-b border-slate-100 dark:border-slate-700">
        <button id="msg-tab-received" onclick="switchMsgTab('received')"
          class="flex-1 py-3 text-sm font-bold text-center text-blue-700 border-b-2 border-blue-600">받은 메시지</button>
        <button id="msg-tab-sent" onclick="switchMsgTab('sent')"
          class="flex-1 py-3 text-sm font-bold text-center text-slate-400 border-b-2 border-transparent">보낸 메시지</button>
      </div>

      <div id="msg-list-container"
        class="flex-1 overflow-y-auto p-4 flex flex-col gap-2 bg-slate-50/50 dark:bg-slate-900/20">
        <div class="text-center py-8 text-slate-400 text-sm">로딩 중...</div>
      </div>
    </div>
  </div>
  </div>

  <!-- Create Task/Guide Modal -->
  <div id="create-modal" class="fixed inset-0 z-[60] hidden items-center justify-center modal-overlay">
    <div
      class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-sm mx-4 shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-5 border-b border-slate-100 dark:border-slate-700">
        <h3 class="text-lg font-bold">새 항목 등록</h3>
        <button onclick="closeCreateModal()" class="text-slate-400 hover:text-slate-600">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <!-- Tab Selector -->
      <div class="flex border-b border-slate-100 dark:border-slate-700">
        <button id="modal-tab-task" onclick="switchModalTab('task')"
          class="flex-1 py-3 text-sm font-bold text-center text-blue-700 border-b-2 border-blue-600">과제</button>
        <button id="modal-tab-guide" onclick="switchModalTab('guide')"
          class="flex-1 py-3 text-sm font-bold text-center text-slate-400 border-b-2 border-transparent">가이드</button>
      </div>

      <!-- Task Form -->
      <form id="modal-task-form" onsubmit="handleCreateTask(event)" class="p-5 flex flex-col gap-4">
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">과제명</label>
          <input id="create-task-title" type="text" required placeholder="예: 초진 환자 케이스 발표"
            class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">마감일</label>
          <input id="create-task-due" type="date" required
            class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">코멘트</label>
          <textarea id="create-task-comment" rows="2" placeholder="기타 참고사항을 입력하세요..."
            class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm resize-none"></textarea>
        </div>
        <button type="submit"
          class="w-full h-14 bg-blue-600 text-white font-bold rounded-xl shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">add_circle</span> 과제 등록
        </button>
      </form>

      <!-- Guide Form -->
      <form id="modal-guide-form" onsubmit="handleCreateGuide(event)" class="p-5 flex flex-col gap-4 hidden">
        <div class="flex gap-3">
          <div class="flex-1">
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">대상 날짜</label>
            <input id="create-guide-date" type="date" required
              class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm" />
          </div>
          <div class="w-32">
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">출첵시간</label>
            <input id="create-guide-time" type="time"
              class="w-full h-12 px-2 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm" />
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">복장 안내</label>
          <input id="create-guide-dress" type="text" placeholder="예: 스크럽 및 원내생 가운"
            class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm" />
        </div>
        <div>
          <div class="flex items-center justify-between mb-1">
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">필수 준비물</label>
            <button type="button" onclick="addMaterialInput('create')"
              class="text-blue-600 hover:text-blue-700 text-xs font-bold px-2 py-0.5 rounded-md hover:bg-blue-50 transition-colors dark:hover:bg-blue-900/30">+
              추가</button>
          </div>
          <div id="create-guide-materials-container" class="flex flex-col gap-2">
            <div class="flex items-center gap-2 material-input-row">
              <input type="text" placeholder="예: 덴티폼"
                class="flex-1 h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm material-input-value" />
              <button type="button" onclick="this.parentElement.remove()"
                class="p-2 text-slate-400 hover:text-red-500 transition-colors shrink-0">
                <span class="material-symbols-outlined pointer-events-none">remove_circle</span>
              </button>
            </div>
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">코멘트</label>
          <textarea id="create-guide-comment" rows="2" placeholder="기타 참고사항을 입력하세요..."
            class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm resize-none"></textarea>
        </div>
        <button type="submit"
          class="w-full h-14 bg-blue-600 text-white font-bold rounded-xl shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">add_circle</span> 가이드 등록
        </button>
      </form>
    </div>
  </div>

  <!-- Edit Task Modal -->
  <div id="edit-task-modal" class="fixed inset-0 z-[60] hidden items-center justify-center modal-overlay">
    <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-sm mx-4 shadow-2xl overflow-hidden">
      <div class="flex items-center justify-between p-5 border-b border-slate-100 dark:border-slate-700">
        <h3 class="text-lg font-bold">과제 수정</h3>
        <button onclick="closeEditTaskModal()" class="text-slate-400 hover:text-slate-600">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <form id="edit-task-form" onsubmit="handleEditTask(event)" class="p-5 flex flex-col gap-4">
        <input type="hidden" id="edit-task-id" />
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">과제명</label>
          <input id="edit-task-title" type="text" required
            class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">마감일</label>
          <input id="edit-task-due" type="date" required
            class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">코멘트</label>
          <textarea id="edit-task-comment" rows="2" placeholder="기타 참고사항을 입력하세요..."
            class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm resize-none"></textarea>
        </div>
        <button type="submit"
          class="w-full h-14 bg-blue-600 text-white font-bold rounded-xl shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">save</span> 수정하기
        </button>
      </form>
    </div>
  </div>

  <!-- Edit Guide Modal -->
  <div id="edit-guide-modal" class="fixed inset-0 z-[60] hidden items-center justify-center modal-overlay">
    <div
      class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-sm mx-4 shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-5 border-b border-slate-100 dark:border-slate-700">
        <h3 class="text-lg font-bold">가이드 수정</h3>
        <button onclick="closeEditGuideModal()" class="text-slate-400 hover:text-slate-600">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <form id="edit-guide-form" onsubmit="handleEditGuide(event)" class="p-5 flex flex-col gap-4">
        <input type="hidden" id="edit-guide-id" />
        <div class="flex gap-3">
          <div class="flex-1">
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">대상 날짜</label>
            <input id="edit-guide-date" type="date" required
              class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm" />
          </div>
          <div class="w-32">
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">출첵시간</label>
            <input id="edit-guide-time" type="time"
              class="w-full h-12 px-2 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm" />
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">복장 안내</label>
          <input id="edit-guide-dress" type="text"
            class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm" />
        </div>
        <div>
          <div class="flex items-center justify-between mb-1">
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">필수 준비물</label>
            <button type="button" onclick="addMaterialInput('edit')"
              class="text-blue-600 hover:text-blue-700 text-xs font-bold px-2 py-0.5 rounded-md hover:bg-blue-50 transition-colors dark:hover:bg-blue-900/30">+
              추가</button>
          </div>
          <div id="edit-guide-materials-container" class="flex flex-col gap-2">
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">코멘트</label>
          <textarea id="edit-guide-comment" rows="2" placeholder="기타 참고사항을 입력하세요..."
            class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm resize-none"></textarea>
        </div>
        <button type="submit"
          class="w-full h-14 bg-blue-600 text-white font-bold rounded-xl shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">save</span> 수정하기
        </button>
      </form>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="fixed inset-0 z-[100] hidden items-center justify-center modal-overlay">
    <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-[320px] mx-4 shadow-2xl p-6 text-center">
      <div
        class="w-12 h-12 rounded-full bg-red-100 dark:bg-red-900/30 text-red-600 flex items-center justify-center mx-auto mb-4">
        <span class="material-symbols-outlined text-2xl">warning</span>
      </div>
      <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2" id="confirm-title">항목 삭제</h3>
      <p class="text-sm text-slate-500 dark:text-slate-400 mb-6" id="confirm-message">정말 삭제하시겠습니까?</p>
      <div class="flex gap-3">
        <button type="button" onclick="closeConfirmModal(false)"
          class="flex-1 py-3 rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold active:scale-95 transition-all">취소</button>
        <button type="button" onclick="closeConfirmModal(true)"
          class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold shadow-md shadow-red-200 dark:shadow-none active:scale-95 transition-all">삭제</button>
      </div>
    </div>
  </div>

  <!-- Send Message Modal -->
  <div id="send-msg-modal" class="fixed inset-0 z-[60] hidden items-center justify-center modal-overlay">
    <div
      class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-sm mx-4 shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-5 border-b border-slate-100 dark:border-slate-700">
        <h3 class="text-lg font-bold flex items-center gap-2">
          <span class="material-symbols-outlined text-violet-600">send</span> 메시지 보내기
        </h3>
        <button onclick="closeSendMessageModal()" class="text-slate-400 hover:text-slate-600">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="p-5 flex flex-col gap-4">
        <!-- Recipient selection -->
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 block">수신자 선택</label>
          <label
            class="flex items-center gap-3 p-3 bg-violet-50 dark:bg-violet-900/20 rounded-xl border-2 border-violet-200 dark:border-violet-800 cursor-pointer mb-2">
            <input type="checkbox" id="msg-select-all" onchange="toggleSelectAllRecipients(this.checked)"
              class="h-5 w-5 rounded border-2 border-violet-300 text-violet-600 focus:ring-violet-500" />
            <span class="text-sm font-bold text-violet-700 dark:text-violet-300">전체 보내기</span>
          </label>
          <div id="msg-recipient-list" class="flex flex-col gap-1.5 max-h-40 overflow-y-auto">
          </div>
        </div>
        <!-- Message content -->
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">메시지 내용</label>
          <textarea id="msg-content" rows="4" required placeholder="조원에게 전달할 내용을 입력하세요..."
            class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-violet-500 focus:ring-0 text-sm resize-none"></textarea>
        </div>
        <button type="button" onclick="handleSendMessage()"
          class="w-full h-14 bg-gradient-to-r from-violet-600 to-blue-600 text-white font-bold rounded-xl shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">send</span> 전송하기
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    let _currentUser = null;
    let _currentDept = null;
    let _currentDeptIndex = null;
    let _weekNumber = null;

    async function init() {
      _currentUser = await requireAuth();
      if (!_currentUser) return;

      // 조장 권한 체크 (조장이 아니면 member.html로 튕겨내기)
      if (!_currentUser.is_leader) {
        showToast('조장 권한이 없습니다.', 'error');
        setTimeout(() => { window.location.href = 'member.html'; }, 1000);
        return;
      }

      _weekNumber = getCurrentWeekNumber();
      _currentDeptIndex = getCurrentDepartmentIndex(_currentUser.group_id);
      _currentDept = await getDepartmentByIndex(_currentDeptIndex);

      // 배너 렌더링
      document.getElementById('banner-week').textContent = `임상 실습 ${_weekNumber}주차 진행 중`;
      document.getElementById('banner-dept').textContent = `현재 과: ${_currentDept.name}`;
      document.getElementById('banner-group').textContent = `${_currentUser.group_id}조`;

      // 이전 조 버튼 텍스트
      const prevGroupId = getPreviousGroupId(_currentDeptIndex, _weekNumber);
      if (prevGroupId) {
        document.getElementById('import-task-btn-text').textContent = `과제 복사 (${prevGroupId}조)`;
        document.getElementById('import-guide-btn-text').textContent = `가이드 복사 (${prevGroupId}조)`;
      } else {
        document.getElementById('import-task-btn-text').textContent = '1주차(과제 없음)';
        document.getElementById('import-task-btn').disabled = true;
        document.getElementById('import-task-btn').classList.add('opacity-50');

        document.getElementById('import-guide-btn-text').textContent = '1주차(가이드 없음)';
        document.getElementById('import-guide-btn').disabled = true;
        document.getElementById('import-guide-btn').classList.add('opacity-50');
      }

      // 데이터 로드
      await Promise.all([loadCurrentTasks(), loadCurrentGuides(), loadGroupMembers(), loadUnreadBadge()]);
    }

    // ========== 현재 등록된 과제 ==========
    async function loadCurrentTasks() {
      if (!_currentDept) return;
      const tasks = await fetchTasks(_currentUser.group_id, _currentDept.id);
      window._cachedTasks = tasks;
      const container = document.getElementById('current-task-list');
      const countEl = document.getElementById('current-task-count');
      countEl.textContent = `총 ${tasks.length}건`;

      if (tasks.length === 0) {
        container.innerHTML = `
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 p-6 text-center">
            <span class="material-symbols-outlined text-3xl text-slate-300 mb-2 block">inbox</span>
            <p class="text-slate-400 text-sm">등록된 과제가 없습니다</p>
          </div>`;
        return;
      }

      container.innerHTML = tasks.map(t => {
        const dday = t.due_date ? getDday(t.due_date) : '';
        const ddayStyle = t.due_date ? getDdayStyle(t.due_date) : '';
        return `
          <div class="flex items-center justify-between p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700">
            <div class="flex-1 min-w-0 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50 p-1 -m-1 rounded transition-colors" onclick="openEditTaskModal(${t.id})">
              <p class="text-sm font-medium text-slate-800 dark:text-slate-100 truncate">${t.title}</p>
              <p class="text-xs text-slate-400 mt-0.5">${t.due_date || '마감일 미정'} ${t.rotation_day ? '· ' + t.rotation_day + '일차' : ''}</p>
            </div>
            ${dday ? `<span class="text-xs font-bold ${ddayStyle} px-2 py-0.5 rounded border ml-2 whitespace-nowrap">${dday}</span>` : ''}
            <button type="button" onclick="handleDeleteTask(${t.id})" class="p-2 ml-1 text-slate-300 hover:text-red-500 transition-colors shrink-0 active:scale-90">
              <span class="material-symbols-outlined text-xl pointer-events-none">delete</span>
            </button>
          </div>`;
      }).join('');
    }

    // ========== 현재 등록된 가이드 ==========
    async function loadCurrentGuides() {
      if (!_currentDept) return;
      const guides = await fetchWeeklyGuides(_currentUser.group_id, _currentDept.id);
      window._cachedGuides = guides;
      const container = document.getElementById('current-guide-list');

      if (guides.length === 0) {
        container.innerHTML = `
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 p-6 text-center">
            <span class="material-symbols-outlined text-3xl text-slate-300 mb-2 block">lightbulb</span>
            <p class="text-slate-400 text-sm">등록된 가이드가 없습니다</p>
          </div>`;
        return;
      }

      container.innerHTML = guides.map(g => {
        let itemsHtml = '';
        if (g.attendance_time) {
          itemsHtml += `
            <div class="flex items-center gap-2 mb-1.5">
              <span class="material-symbols-outlined text-sm text-blue-500 border border-blue-100 dark:border-blue-900/50 bg-blue-50 dark:bg-blue-900/20 p-1 rounded-md shrink-0">alarm</span>
              <p class="text-sm font-medium text-slate-800 dark:text-slate-100 flex-1 truncate"><span class="text-xs text-slate-500 font-semibold mr-1.5">출첵</span>${g.attendance_time.substring(0, 5)}</p>
            </div>
          `;
        }
        if (g.dress_code) {
          itemsHtml += `
            <div class="flex items-center gap-2 mb-1.5">
              <span class="material-symbols-outlined text-sm text-indigo-500 border border-indigo-100 dark:border-indigo-900/50 bg-indigo-50 dark:bg-indigo-900/20 p-1 rounded-md shrink-0">checkroom</span>
              <p class="text-sm font-medium text-slate-800 dark:text-slate-100 flex-1 truncate"><span class="text-xs text-slate-500 font-semibold mr-1.5">복장</span>${g.dress_code}</p>
            </div>
          `;
        }
        if (g.materials) {
          let parsedMaterials = [];
          try {
            parsedMaterials = JSON.parse(g.materials);
            if (!Array.isArray(parsedMaterials)) parsedMaterials = [g.materials];
          } catch (e) {
            parsedMaterials = [g.materials];
          }
          itemsHtml += `
            <div class="flex items-start gap-2">
              <span class="material-symbols-outlined text-sm text-orange-500 border border-orange-100 dark:border-orange-900/50 bg-orange-50 dark:bg-orange-900/20 p-1 rounded-md shrink-0">handyman</span>
              <div class="flex-1 min-w-0 pt-0.5">
                <p class="text-xs text-slate-500 font-semibold mb-0.5">준비물</p>
                <div class="flex flex-col gap-0.5">
                  ${parsedMaterials.map(m => `<p class="text-sm font-medium text-slate-800 dark:text-slate-100 truncate">• ${m}</p>`).join('')}
                </div>
              </div>
            </div>
            `;
        }
        if (g.comment) {
          itemsHtml += `
            <div class="flex items-start gap-2 mt-2 pt-2 border-t border-slate-100 dark:border-slate-700/50">
              <span class="material-symbols-outlined text-sm text-yellow-600 border border-yellow-200 dark:border-yellow-900/50 bg-yellow-50 dark:bg-yellow-900/20 p-1 rounded-md shrink-0">chat</span>
              <div class="flex-1 min-w-0 pt-0.5">
                <p class="text-sm font-medium text-slate-700 dark:text-slate-300 w-full whitespace-pre-wrap">${g.comment}</p>
              </div>
            </div>
          `;
        }

        return `
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 p-4 shadow-sm">
          <div class="flex items-start justify-between mb-3 border-b border-slate-100 dark:border-slate-700/50 pb-3">
             <div class="flex items-center gap-2">
                <div class="bg-primary/30 py-1 px-2 rounded-md text-blue-700 flex items-center justify-center">
                  <span class="material-symbols-outlined text-[16px]">event</span>
                </div>
                <p class="text-sm font-bold text-slate-800 dark:text-slate-100">${g.target_date ? formatDateShort(g.target_date) : '날짜 미정'}</p>
             </div>
             <div class="flex gap-1 shrink-0">
                <button type="button" onclick="openEditGuideModal(${g.id})" class="p-1 text-slate-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 rounded transition-colors active:scale-90 aspect-square flex items-center justify-center">
                  <span class="material-symbols-outlined text-[18px] pointer-events-none">edit</span>
                </button>
                <button type="button" onclick="handleDeleteGuide(${g.id})" class="p-1 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors active:scale-90 aspect-square flex items-center justify-center">
                  <span class="material-symbols-outlined text-[18px] pointer-events-none">delete</span>
                </button>
             </div>
          </div>
          <div class="flex flex-col">
            ${itemsHtml || '<p class="text-sm text-slate-400 italic">등록된 상세 항목이 없습니다.</p>'}
          </div>
        </div>
      `;
      }).join('');
    }

    // ========== 우리 조원 명단 ==========
    async function loadGroupMembers() {
      try {
        const members = await fetchGroupMembers(_currentUser.group_id);
        const container = document.getElementById('group-member-list');
        const countEl = document.getElementById('group-member-count');
        countEl.textContent = `총 ${members.length}명`;

        if (members.length === 0) {
          container.innerHTML = `
            <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 p-6 text-center">
              <span class="material-symbols-outlined text-3xl text-slate-300 mb-2 block">group_off</span>
              <p class="text-slate-400 text-sm">등록된 조원이 없습니다</p>
            </div>`;
          return;
        }

        container.innerHTML = members.map(m => `
          <div class="flex items-center justify-between p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-300 flex items-center justify-center font-bold text-lg">
                ${m.name.charAt(0)}
              </div>
              <div>
                <p class="text-[15px] font-bold text-slate-800 dark:text-slate-100 flex items-center gap-1.5">
                  ${m.name}
                  ${m.is_leader ? '<span class="material-symbols-outlined text-[16px] text-amber-500" style="font-variation-settings:\'FILL\' 1">crown</span>' : ''}
                </p>
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error(err);
        const container = document.getElementById('group-member-list');
        container.innerHTML = '<div class="text-center py-4 text-red-500 text-sm">불러오기에 실패했습니다.</div>';
      }
    }

    // ========== 메시지 보내기 ==========
    let _memberListForMsg = [];

    async function openSendMessageModal() {
      const modal = document.getElementById('send-msg-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');

      // 조원 목록 로드
      try {
        _memberListForMsg = await fetchGroupMembers(_currentUser.group_id);
        const listEl = document.getElementById('msg-recipient-list');
        // 자기 자신은 제외
        const others = _memberListForMsg.filter(m => m.id !== _currentUser.id);
        listEl.innerHTML = others.map(m => `
          <label class="flex items-center gap-3 p-2.5 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700/50 cursor-pointer transition-colors">
            <input type="checkbox" value="${m.id}" class="msg-recipient-cb h-4 w-4 rounded border-2 border-slate-300 text-violet-600 focus:ring-violet-500" />
            <span class="text-sm font-medium text-slate-700 dark:text-slate-200">${m.name}${m.is_leader ? ' (조장)' : ''}</span>
          </label>
        `).join('');
        document.getElementById('msg-select-all').checked = false;
      } catch (err) {
        console.error(err);
      }
    }

    function closeSendMessageModal() {
      const modal = document.getElementById('send-msg-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      document.getElementById('msg-content').value = '';
      document.getElementById('msg-select-all').checked = false;
    }

    function toggleSelectAllRecipients(checked) {
      document.querySelectorAll('.msg-recipient-cb').forEach(cb => {
        cb.checked = checked;
      });
    }

    async function handleSendMessage() {
      const content = document.getElementById('msg-content').value.trim();
      if (!content) {
        showToast('메시지 내용을 입력해주세요.', 'warning');
        return;
      }

      const selectAllChecked = document.getElementById('msg-select-all').checked;
      let recipientIds = [];

      if (selectAllChecked) {
        // 전체: 자기 자신 제외한 조원 전체
        recipientIds = _memberListForMsg
          .filter(m => m.id !== _currentUser.id)
          .map(m => m.id);
      } else {
        // 선택된 조원만
        document.querySelectorAll('.msg-recipient-cb:checked').forEach(cb => {
          recipientIds.push(cb.value);
        });
      }

      if (recipientIds.length === 0) {
        showToast('수신자를 선택해주세요.', 'warning');
        return;
      }

      try {
        await sendMessage(_currentUser.id, _currentUser.group_id, content, recipientIds);
        showToast(`${recipientIds.length}명에게 메시지를 보냈습니다!`, 'success');
        closeSendMessageModal();
      } catch (err) {
        console.error(err);
        showToast('메시지 전송에 실패했습니다.', 'error');
      }
    }

    // ========== 이전 조 과제 및 가이드 불러오기 ==========
    async function handleImportTasks() {
      if (!confirm('이전 조의 과제를 불러오시겠습니까? 기존 과제는 유지됩니다.')) return;

      const btn = document.getElementById('import-task-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-base">progress_activity</span> <span class="truncate text-[13px]">불러오는 중...</span>';

      try {
        const result = await importPreviousTasks(_currentUser.group_id, _currentDept.id, _currentDeptIndex);
        showToast(`${result.prevGroupId}조의 과제 ${result.inserted.length}건을 불러왔습니다!`, 'success');
        await loadCurrentTasks();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        const prevGroupId = getPreviousGroupId(_currentDeptIndex, _weekNumber);
        btn.innerHTML = `<span class="material-symbols-outlined text-base">history</span><span id="import-task-btn-text" class="truncate text-[13px]">과제 복사 (${prevGroupId}조)</span>`;
      }
    }

    async function handleImportGuides() {
      if (!confirm('이전 조의 가이드를 불러오시겠습니까? 기존 가이드는 유지됩니다.')) return;

      const btn = document.getElementById('import-guide-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-base">progress_activity</span> <span class="truncate text-[13px]">불러오는 중...</span>';

      try {
        const result = await importPreviousGuides(_currentUser.group_id, _currentDept.id, _currentDeptIndex);
        showToast(`${result.prevGroupId}조의 가이드 ${result.inserted.length}건을 불러왔습니다!`, 'success');
        await loadCurrentGuides();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        const prevGroupId = getPreviousGroupId(_currentDeptIndex, _weekNumber);
        btn.innerHTML = `<span class="material-symbols-outlined text-base">event_repeat</span><span id="import-guide-btn-text" class="truncate text-[13px]">가이드 복사 (${prevGroupId}조)</span>`;
      }
    }

    let _confirmResolve = null;

    function openConfirmModal(title, message) {
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-message').textContent = message;
      const modal = document.getElementById('confirm-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      return new Promise(resolve => {
        _confirmResolve = resolve;
      });
    }

    function closeConfirmModal(result) {
      const modal = document.getElementById('confirm-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      if (_confirmResolve) {
        _confirmResolve(result);
        _confirmResolve = null;
      }
    }

    // ========== 과제 삭제 ==========
    async function handleDeleteTask(taskId) {
      if (!(await openConfirmModal('과제 삭제', '이 과제를 삭제하시겠습니까?'))) return;
      try {
        await deleteTask(taskId);
        showToast('과제가 삭제되었습니다.', 'success');
        await loadCurrentTasks();
      } catch (err) {
        console.error(err);
        showToast('삭제에 실패했습니다: ' + (err.message || '알 수 없는 오류'), 'error');
      }
    }

    // ========== 가이드 삭제 ==========
    async function handleDeleteGuide(guideId) {
      if (!(await openConfirmModal('가이드 삭제', '이 가이드를 삭제하시겠습니까?'))) return;
      try {
        await deleteDailyGuide(guideId);
        showToast('가이드가 삭제되었습니다.', 'success');
        await loadCurrentGuides();
      } catch (err) {
        console.error(err);
        showToast('삭제에 실패했습니다: ' + (err.message || '알 수 없는 오류'), 'error');
      }
    }

    // ========== 다중 준비물 관리 ==========
    function createMaterialInputTemplate(value = '') {
      return `
        <div class="flex items-center gap-2 material-input-row">
          <input type="text" placeholder="예: 덴티폼" value="${value.replace(/"/g, '&quot;')}"
            class="flex-1 h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm material-input-value" />
          <button type="button" onclick="this.parentElement.remove()" class="p-2 text-slate-400 hover:text-red-500 transition-colors shrink-0">
            <span class="material-symbols-outlined pointer-events-none">remove_circle</span>
          </button>
        </div>
      `;
    }

    function addMaterialInput(type) {
      const container = document.getElementById(`${type}-guide-materials-container`);
      if (container) {
        container.insertAdjacentHTML('beforeend', createMaterialInputTemplate());
      }
    }

    function getMaterialsFromContainer(type) {
      const container = document.getElementById(`${type}-guide-materials-container`);
      if (!container) return null;
      const inputs = container.querySelectorAll('.material-input-value');
      const values = Array.from(inputs).map(input => input.value.trim()).filter(val => val !== '');
      if (values.length === 0) return null;
      if (values.length === 1) return values[0]; // 단일 항목
      return JSON.stringify(values);
    }

    function setMaterialsToContainer(type, materialsString) {
      const container = document.getElementById(`${type}-guide-materials-container`);
      if (!container) return;
      container.innerHTML = '';
      if (!materialsString) {
        addMaterialInput(type);
      } else {
        try {
          const parsed = JSON.parse(materialsString);
          if (Array.isArray(parsed)) {
            if (parsed.length === 0) {
              addMaterialInput(type);
            } else {
              parsed.forEach(val => {
                container.insertAdjacentHTML('beforeend', createMaterialInputTemplate(val));
              });
            }
          } else {
            container.insertAdjacentHTML('beforeend', createMaterialInputTemplate(materialsString));
          }
        } catch (e) {

    // ========== 메시지 확인 로직 ==========
    async function loadUnreadBadge() {
      try {
        const count = await getUnreadMessageCount(_currentUser.id);
        const badge = document.getElementById('msg-badge');
        if (count > 0) {
          badge.textContent = count > 99 ? '99+' : count;
          badge.classList.remove('hidden');
          badge.classList.add('flex');
        } else {
          badge.classList.add('hidden');
          badge.classList.remove('flex');
        }
      } catch (err) {
        console.error(err);
      }
    }

    function formatMessageTime(isoStr) {
      const d = new Date(isoStr);
      const now = new Date();
      const diffMs = now - d;
      const diffMin = Math.floor(diffMs / 60000);
      if (diffMin < 1) return '방금 전';
      if (diffMin < 60) return `${diffMin}분 전`;
      const diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24) return `${diffHr}시간 전`;
      const diffDay = Math.floor(diffHr / 24);
      if (diffDay < 7) return `${diffDay}일 전`;
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    let _currentMsgTab = 'received';

    async function openMessageListModal() {
      const modal = document.getElementById('msg-list-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');

      if (_currentUser && _currentUser.is_leader) {
        document.getElementById('msg-tab-container').classList.remove('hidden');
        document.getElementById('msg-tab-container').classList.add('flex');
      }

      await switchMsgTab('received');
    }

    async function switchMsgTab(tab) {
      _currentMsgTab = tab;
      const tabReceived = document.getElementById('msg-tab-received');
      const tabSent = document.getElementById('msg-tab-sent');

      if (tab === 'received') {
        tabReceived.className = 'flex-1 py-3 text-sm font-bold text-center text-blue-700 border-b-2 border-blue-600';
        tabSent.className = 'flex-1 py-3 text-sm font-bold text-center text-slate-400 border-b-2 border-transparent';
        document.getElementById('msg-modal-title').innerHTML = '<span class="material-symbols-outlined text-blue-600">mail</span> 받은 메시지';
        await loadReceivedMessages();
      } else {
        tabSent.className = 'flex-1 py-3 text-sm font-bold text-center text-blue-700 border-b-2 border-blue-600';
        tabReceived.className = 'flex-1 py-3 text-sm font-bold text-center text-slate-400 border-b-2 border-transparent';
        document.getElementById('msg-modal-title').innerHTML = '<span class="material-symbols-outlined text-blue-600">send</span> 보낸 메시지';
        await loadSentMessages();
      }
    }

    async function loadReceivedMessages() {
      const container = document.getElementById('msg-list-container');
      container.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">로딩 중...</div>';

      try {
        const messages = await fetchReceivedMessages(_currentUser.id);

        if (messages.length === 0) {
          container.innerHTML = `
            <div class="text-center py-12">
              <span class="material-symbols-outlined text-4xl text-slate-300 mb-2 block">mail</span>
              <p class="text-slate-400 text-sm">받은 메시지가 없습니다</p>
            </div>`;
          return;
        }

        container.innerHTML = messages.map(mr => {
          const msg = mr.messages;
          const senderName = msg?.profiles?.name || '알 수 없음';
          const isUnread = !mr.is_read;
          const unreadDot = isUnread ? '<span class="w-2.5 h-2.5 bg-blue-500 rounded-full shrink-0 animate-pulse"></span>' : '';
          const bgClass = isUnread ? 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800' : 'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700';

          return `
            <div class="${bgClass} rounded-xl border p-4 mb-2 shadow-sm flex flex-col">
              <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2">
                  ${unreadDot}
                  <span class="text-sm font-bold text-slate-800 dark:text-slate-100">${senderName}</span>
                  <span class="text-[10px] px-1.5 py-0.5 rounded bg-violet-100 dark:bg-violet-900/30 text-violet-600 dark:text-violet-400 font-bold">조장</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-[11px] text-slate-400 font-medium">${formatMessageTime(msg.created_at)}</span>
                  <button type="button" onclick="handleDeleteReceivedMessage(${mr.id})" class="p-1 -mr-2 text-slate-300 hover:text-red-500 transition-colors" title="메시지 삭제">
                    <span class="material-symbols-outlined text-[18px]">delete</span>
                  </button>
                </div>
              </div>
              <p class="text-sm text-slate-700 dark:text-slate-300 whitespace-pre-wrap leading-relaxed">${msg.content}</p>
            </div>`;
        }).join('');

        // 읽음 처리
        await markAllMessagesAsRead(_currentUser.id);
        await loadUnreadBadge();
      } catch (err) {
        console.error(err);
        container.innerHTML = '<div class="text-center py-8 text-red-500 text-sm">메시지를 불러오는 데 실패했습니다.</div>';
      }
    }

    async function loadSentMessages() {
      const container = document.getElementById('msg-list-container');
      container.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">로딩 중...</div>';

      try {
        const messages = await fetchSentMessages(_currentUser.id);

        if (messages.length === 0) {
          container.innerHTML = `
            <div class="text-center py-12">
              <span class="material-symbols-outlined text-4xl text-slate-300 mb-2 block">send</span>
              <p class="text-slate-400 text-sm">보낸 메시지가 없습니다</p>
            </div>`;
          return;
        }

        container.innerHTML = messages.map(msg => {
          const reads = msg.message_recipients || [];
          const readCount = reads.filter(r => r.is_read).length;
          const totalCount = reads.length;

          let statusHtml = '';
          if (readCount === totalCount && totalCount > 0) {
            statusHtml = `<span class="text-[10px] text-blue-600 dark:text-blue-400 font-bold bg-blue-50 dark:bg-blue-900/20 px-1.5 py-0.5 rounded">전원 읽음</span>`;
          } else {
            statusHtml = `<span class="text-[10px] text-slate-500 font-bold bg-slate-100 dark:bg-slate-700 px-1.5 py-0.5 rounded">읽음 ${readCount}/${totalCount}</span>`;
          }

          return `
            <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 p-4 mb-2 shadow-sm">
              <div class="flex items-center justify-between mb-2 border-b border-slate-100 dark:border-slate-700/50 pb-2">
                <div class="flex items-center gap-2">
                  <span class="text-sm font-bold text-slate-800 dark:text-slate-100">${formatMessageTime(msg.created_at)} 전송</span>
                </div>
                ${statusHtml}
              </div>
              <p class="text-sm text-slate-700 dark:text-slate-300 whitespace-pre-wrap leading-relaxed">${msg.content}</p>
            </div>`;
        }).join('');
      } catch (err) {
        console.error(err);
        container.innerHTML = '<div class="text-center py-8 text-red-500 text-sm">메시지를 불러오는 데 실패했습니다.</div>';
      }
    }

    async function handleDeleteReceivedMessage(id) {
      if (!confirm('이 메시지를 삭제하시겠습니까?')) return;
      try {
        await deleteReceivedMessage(id);
        showToast('메시지가 삭제되었습니다.', 'success');
        if (_currentMsgTab === 'received') {
          await loadReceivedMessages();
        }
      } catch (err) {
        console.error(err);
        showToast('삭제에 실패했습니다.', 'error');
      }
    }

    function closeMessageListModal() {
      const modal = document.getElementById('msg-list-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // 초기화
    init();
  </script>
