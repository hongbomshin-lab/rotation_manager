<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>로그인 — 로테이션 관리</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#e3f2fd",
            "background-light": "#f6f7f8",
            "background-dark": "#101a22",
          },
          fontFamily: {
            display: ["Inter", "Noto Sans KR", "sans-serif"],
          },
          borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
        },
      },
    };
  </script>
  <style>
    body { -webkit-tap-highlight-color: transparent; min-height: 100dvh; }
    .tab-active { color: #1d4ed8; border-bottom: 2px solid #1d4ed8; }
    .tab-inactive { color: #94a3b8; border-bottom: 2px solid transparent; }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo / Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-2xl shadow-lg shadow-blue-200 mb-4">
        <span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1">stethoscope</span>
      </div>
      <h1 class="text-2xl font-bold text-slate-900 dark:text-white">임상 실습 로테이션</h1>
      <p class="text-slate-500 text-sm mt-1">서울대학교 치과대학 원내생</p>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700 overflow-hidden">
      <!-- Tabs -->
      <div class="flex border-b border-slate-100 dark:border-slate-700">
        <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-4 text-sm font-bold text-center tab-active transition-all">로그인</button>
        <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 py-4 text-sm font-bold text-center tab-inactive transition-all">회원가입</button>
      </div>

      <!-- Login Form -->
      <form id="form-login" class="p-6 flex flex-col gap-4" onsubmit="handleLogin(event)">
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">이메일</label>
          <input id="login-email" type="email" required placeholder="example@snu.ac.kr"
            class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm transition-colors" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">비밀번호</label>
          <input id="login-password" type="password" required placeholder="••••••••" minlength="6"
            class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm transition-colors" />
        </div>
        <p id="login-error" class="text-red-500 text-xs font-medium hidden"></p>
        <button type="submit" id="login-btn"
          class="w-full h-14 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md shadow-blue-200 dark:shadow-none transition-all active:scale-[0.98] flex items-center justify-center gap-2 text-base">
          <span class="material-symbols-outlined text-xl">login</span>
          로그인
        </button>
      </form>

      <!-- Signup Form -->
      <form id="form-signup" class="p-6 flex flex-col gap-4 hidden" onsubmit="handleSignup(event)">
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">이메일</label>
          <input id="signup-email" type="email" required placeholder="example@snu.ac.kr"
            class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm transition-colors" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">비밀번호</label>
          <input id="signup-password" type="password" required placeholder="6자 이상" minlength="6"
            class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm transition-colors" />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">이름</label>
          <input id="signup-name" type="text" required placeholder="홍범"
            class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm transition-colors" />
        </div>
        <div class="flex gap-3">
          <div class="flex-1">
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">조 번호</label>
            <select id="signup-group" required
              class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 focus:border-blue-500 focus:ring-0 text-sm transition-colors">
              <option value="">선택</option>
              <option value="1">1조</option>
              <option value="2">2조</option>
              <option value="3">3조</option>
              <option value="4">4조</option>
              <option value="5">5조</option>
              <option value="6">6조</option>
              <option value="7">7조</option>
              <option value="8">8조</option>
              <option value="9">9조</option>
              <option value="10">10조</option>
            </select>
          </div>
          <div class="flex items-end pb-1">
            <label class="flex items-center gap-2 cursor-pointer bg-primary/40 px-4 h-12 rounded-xl border-2 border-primary">
              <input id="signup-leader" type="checkbox" class="h-5 w-5 rounded border-2 border-primary text-blue-600 focus:ring-blue-500" />
              <span class="text-sm font-bold text-blue-700 whitespace-nowrap">조장</span>
            </label>
          </div>
        </div>
        <p id="signup-error" class="text-red-500 text-xs font-medium hidden"></p>
        <p id="signup-success" class="text-green-600 text-xs font-medium hidden"></p>
        <button type="submit" id="signup-btn"
          class="w-full h-14 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md shadow-blue-200 dark:shadow-none transition-all active:scale-[0.98] flex items-center justify-center gap-2 text-base">
          <span class="material-symbols-outlined text-xl">person_add</span>
          회원가입
        </button>
      </form>
    </div>

    <p class="text-center text-slate-400 text-xs mt-6">© 2026 SNU Dental Rotation Manager</p>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    // 이미 로그인된 경우 리다이렉트
    (async () => {
      const user = await getCurrentUser();
      if (user) {
        window.location.href = user.is_leader ? 'head.html' : 'member.html';
      }
    })();

    function switchTab(tab) {
      const loginTab = document.getElementById('tab-login');
      const signupTab = document.getElementById('tab-signup');
      const loginForm = document.getElementById('form-login');
      const signupForm = document.getElementById('form-signup');

      if (tab === 'login') {
        loginTab.className = loginTab.className.replace('tab-inactive', 'tab-active');
        signupTab.className = signupTab.className.replace('tab-active', 'tab-inactive');
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
      } else {
        signupTab.className = signupTab.className.replace('tab-inactive', 'tab-active');
        loginTab.className = loginTab.className.replace('tab-active', 'tab-inactive');
        signupForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined text-xl animate-spin">progress_activity</span> 로그인 중...';

      try {
        await signInUser(email, password);
        const user = await getCurrentUser();
        if (!user) throw new Error('사용자 프로필을 찾을 수 없습니다. 회원가입을 먼저 해주세요.');
        window.location.href = user.is_leader ? 'head.html' : 'member.html';
      } catch (err) {
        errorEl.textContent = err.message || '로그인에 실패했습니다.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined text-xl">login</span> 로그인';
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const name = document.getElementById('signup-name').value.trim();
      const groupId = document.getElementById('signup-group').value;
      const isLeader = document.getElementById('signup-leader').checked;
      const errorEl = document.getElementById('signup-error');
      const successEl = document.getElementById('signup-success');
      const btn = document.getElementById('signup-btn');

      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined text-xl animate-spin">progress_activity</span> 가입 중...';

      try {
        const data = await signUpUser(email, password, name, parseInt(groupId), isLeader);

        // 이메일 확인 필요 여부 체크
        if (data.user && !data.session) {
          successEl.textContent = '회원가입 완료! 이메일을 확인하고 인증 링크를 클릭해주세요.';
          successEl.classList.remove('hidden');
          btn.disabled = false;
          btn.innerHTML = '<span class="material-symbols-outlined text-xl">person_add</span> 회원가입';
        } else if (data.session) {
          // 이메일 확인 없이 바로 로그인된 경우
          const user = await getCurrentUser();
          window.location.href = user && user.is_leader ? 'head.html' : 'member.html';
        }
      } catch (err) {
        errorEl.textContent = err.message || '회원가입에 실패했습니다.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined text-xl">person_add</span> 회원가입';
      }
    }
  </script>
</body>
</html>
